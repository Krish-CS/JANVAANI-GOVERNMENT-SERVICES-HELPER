# ─── Render Deployment Config ───
# Deploy as a Web Service on Render Free Tier
# https://render.com

services:
  - type: web
    name: janvaani-api
    runtime: python
    region: singapore  # Closest to India
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      - key: AZURE_TTS_VOICE_EN
        sync: false
      - key: AZURE_TTS_VOICE_HI
        sync: false
      - key: AZURE_TTS_VOICE_TA
        sync: false
      - key: AZURE_TTS_OUTPUT_FORMAT
        value: "riff-24khz-16bit-mono-pcm"
      - key: SARVAM_API_KEY
        sync: false
      - key: BHASHINI_USER_ID
        sync: false
      - key: BHASHINI_API_KEY
        sync: false
      - key: BHASHINI_PIPELINE_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /api/health
    autoDeploy: true
